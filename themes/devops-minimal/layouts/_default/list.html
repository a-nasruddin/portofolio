{{ define "main" }}
<section class="blog-list-section">
  <div class="container">
    <div class="fade-in">
      <p class="section-label">// thoughts &amp; articles</p>
      <h1 class="section-title">All Posts</h1>
      <div class="section-divider"></div>
    </div>
    <div class="blog-grid">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="blog-card fade-in">
        <div class="blog-card-meta">
          <span>{{ .Date.Format "Jan 02, 2006" }}</span>
          {{ with .Params.tags }}{{ range first 1 . }}<span class="blog-card-tag">#{{ . }}</span>{{ end }}{{ end }}
        </div>
        <h2 class="blog-card-title">{{ .Title }}</h2>
        <p class="blog-card-excerpt">{{ .Summary | truncate 150 }}</p>
        <span class="blog-card-arrow">Read more →</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
