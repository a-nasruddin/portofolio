{{ define "main" }}
<article class="blog-post">
  <div class="container">
    <header class="post-header fade-in">
      <a href="/blog" class="back-link">← Back to Blog</a>
      <div class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 02, 2006" }}</time>
        {{ range .Params.tags }}<span class="post-tag">#{{ . }}</span>{{ end }}
      </div>
      <h1 class="post-title">{{ .Title }}</h1>
      {{ with .Params.description }}<p class="post-description">{{ . }}</p>{{ end }}
    </header>
    <div class="post-content fade-in">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
